name: Paper Trading - 3x Daily

# Läuft 40min vor jedem Binance 8h Settlement (00:00, 08:00, 16:00 UTC)
on:
  schedule:
    - cron: '20 23 * * *'   # 23:20 UTC → vor 00:00 Settlement
    - cron: '20 7 * * *'    # 07:20 UTC → vor 08:00 Settlement
    - cron: '20 15 * * *'   # 15:20 UTC → vor 16:00 Settlement
  workflow_dispatch:         # Manueller Trigger für Tests

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Paper Trading State
        uses: actions/cache@v4
        with:
          path: |
            crypto_quant/outputs/paper_trading_state.json
            crypto_quant/outputs/paper_trading_trades.csv
            crypto_quant/outputs/paper_trading_performance.csv
            crypto_quant/outputs/paper_trading_history.csv
            crypto_quant/outputs/dashboard.html
          key: paper-trading-state-${{ github.run_id }}
          restore-keys: |
            paper-trading-state-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r crypto_quant/requirements.txt

      - name: Run Paper Trading Period
        working-directory: crypto_quant
        env:
          PYTHONPATH: .
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
        run: python -m execution.paper_trading --run-once

      - name: Generate Dashboard
        working-directory: crypto_quant
        env:
          PYTHONPATH: .
        run: python generate_dashboard.py

      - name: Save Updated State
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            crypto_quant/outputs/paper_trading_state.json
            crypto_quant/outputs/paper_trading_trades.csv
            crypto_quant/outputs/paper_trading_performance.csv
            crypto_quant/outputs/paper_trading_history.csv
            crypto_quant/outputs/dashboard.html
          key: paper-trading-state-${{ github.run_id }}

      - name: Deploy Dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./crypto_quant/outputs
          publish_branch: gh-pages
          keep_files: true

      - name: Upload Logs as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trading-logs-${{ github.run_number }}
          path: |
            crypto_quant/outputs/paper_trading_trades.csv
            crypto_quant/outputs/paper_trading_performance.csv
            crypto_quant/outputs/paper_trading_errors.log
            crypto_quant/outputs/dashboard.html
          retention-days: 90

      - name: Alert on Critical Error
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Paper Trading Failed - ${new Date().toISOString().slice(0,16)}`,
              body: `Run #${context.runNumber} failed.\n\nLogs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nCheck \`crypto_quant/outputs/paper_trading_errors.log\` for details.`,
              labels: ['trading-error']
            })
